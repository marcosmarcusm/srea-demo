name: Trigger auto deployment for order-api-demo

# When this action will be executed
on:
  # Automatically trigger only when the sample-app source (or this workflow file)
  # changes. Edits to docs, infra, scripts, sre-config, etc. won't rebuild the image.
  push:
    branches:
      [ main ]
    paths:
    - 'sample-app/**'
    - '.github/workflows/order-api-demo-AutoDeployTrigger-aa6110d7-f160-4ccd-852d-097e2ca07e91.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the OIDC JWT Token
      contents: read  # Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ORDERAPIDEMO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ORDERAPIDEMO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ORDERAPIDEMO_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/sample-app
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrjffjqgwlbwhgc.azurecr.io
          registryUsername: ${{ secrets.ORDERAPIDEMO_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ORDERAPIDEMO_REGISTRY_PASSWORD }}
          containerAppName: order-api-demo
          resourceGroup: rg-srea-demo
          imageToBuild: acrjffjqgwlbwhgc.azurecr.io/order-api-demo:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


      - name: Trigger SRE Agent PostDeployValidator
        if: success()
        env:
          TRIGGER_URL: ${{ secrets.SRE_AGENT_TRIGGER_URL }}
        run: |
          if [ -z "$TRIGGER_URL" ]; then
            echo "::warning::SRE_AGENT_TRIGGER_URL secret not set — skipping post-deploy validation."
            exit 0
          fi

          # SRE Agent HTTP triggers require a Bearer token whose audience is the
          # SRE Agent first-party app (NOT https://management.azure.com).
          # See: https://learn.microsoft.com/azure/sre-agent/http-triggers#authentication-for-trigger-invocation
          # The 401 troubleshooting note explicitly calls out this app ID:
          # https://learn.microsoft.com/azure/sre-agent/http-triggers#401-unauthorized
          SRE_AGENT_APP_ID="59f0a04a-b322-4310-adc9-39ac41e9631e"
          ARM_TOKEN=$(az account get-access-token \
            --resource "$SRE_AGENT_APP_ID" \
            --query accessToken -o tsv)

          if [ -z "$ARM_TOKEN" ]; then
            echo "::error::Failed to acquire SRE Agent bearer token. Is azure/login configured?"
            exit 1
          fi

          PAYLOAD=$(cat <<EOF
          {
            "app": "order-api-demo",
            "resource_group": "rg-srea-demo",
            "revision_image": "acrjffjqgwlbwhgc.azurecr.io/order-api-demo:${{ github.sha }}",
            "commit_sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "ref": "${{ github.ref }}",
            "repository": "${{ github.repository }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )

          echo "Notifying PostDeployValidator with payload:"
          echo "$PAYLOAD"

          # --fail-with-body so the job fails (loudly) if the agent endpoint rejects the call
          curl --fail-with-body --silent --show-error \
            -X POST "$TRIGGER_URL" \
            -H "Authorization: Bearer $ARM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
